<!doctype html>
<html>
    <head>
        <script type="module">
            window.process = { env: {} };
            window.__swc = { warn: () => {} };

            // Set up fetch mock before any components are loaded
            const originalFetch = window.fetch;
            window.fetch = async function (args) {
                try {
                    const url = new URL(args);
                    const { pathname, search } = url;
                    const fullPath = pathname + search;

                    if (/querybuilder\.json\?path=\/content\/cq:tags\/mas/.test(fullPath)) {
                        return originalFetch('/test/mocks/tags.json');
                    }
                    if (/querybuilder\.json\?path=\/content\/dam\/mas/.test(fullPath)) {
                        return originalFetch('/test/mocks/folders.json');
                    }
                    return originalFetch(...arguments);
                } catch (e) {
                    // If URL construction fails, just pass through to original fetch
                    return originalFetch(...arguments);
                }
            };
        </script>
        <title>editor-panel custom element test page</title>
        <meta name="nofollow-links" content="on" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="../style.css" />
        <style>
            body {
                margin: 32px;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            sp-theme {
                display: contents;
            }

            editor-panel {
                width: 600px;
                top: 32px;
                bottom: 32px;
                height: initial;
            }
        </style>
    </head>
    <body>
        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import { expect } from '@esm-bundle/chai';
            import sinon from 'sinon';
            import { html } from 'lit';
            import { fixture, oneEvent } from '@open-wc/testing-helpers';
            import '../src/swc.js';
            import '../src/rte/rte-field.js';
            import '../src/aem/aem-tag-picker-field.js';
            import '../src/editor-panel.js';
            import '../src/editors/merch-card-collection-editor.js';
            import '../src/mas-repository.js';
            import { Fragment } from '../src/aem/fragment.js';
            import { FragmentStore } from '../src/reactivity/fragment-store.js';
            import Store from '../src/store.js';
            import { COLLECTION_MODEL_PATH, PAGE_NAMES } from '../src/constants.js';
            import Events from '../src/events.js';
            import { createFromTemplate, delay, triggerInput, triggerRteInput } from './utils.js';

            runTests(async () => {
                const spTheme = document.querySelector('sp-theme');
                const sandbox = sinon.createSandbox();

                const fragmentData = await fetch('/test/mocks/adobe/sites/cf/fragments/collection.json').then((res) =>
                    res.json(),
                );

                describe('editor-panel custom element', () => {
                    afterEach(() => {
                        sandbox.restore();
                    });
                    let fragment;
                    let fragmentStore;
                    let editorPanel;
                    beforeEach(async () => {
                        // Create a collection fragment with a valid UUID
                        const mockFragment = {
                            ...fragmentData,
                            id: '12345678-1234-1234-1234-123456789012',
                        };
                        fragment = new Fragment(mockFragment);
                        fragmentStore = new FragmentStore(fragment);
                        editorPanel = await fixture(html`<editor-panel></editor-panel>`, { parentNode: spTheme });
                        // Mock the repository methods
                        editorPanel.repository.aem.sites.cf.fragments.getVersions = async () => ({ items: [] });
                        editorPanel.repository.refreshFragment = async () => {};
                        editorPanel.repository.getFragment = async () => mockFragment;
                        editorPanel.repository.aem.getFragmentById = async () => mockFragment;
                        await editorPanel.editFragment(fragmentStore);
                        await editorPanel.updateComplete;
                        const store = Store.fragments.inEdit.get();
                        if (store) {
                            const frag = store.get();
                            if (frag) {
                                frag.initialValue = structuredClone(frag);
                                frag.hasChanges = false;
                            }
                            store.notify();
                        }
                        await editorPanel.updateComplete;
                    });

                    it('renders editor panel for collection fragments', async () => {
                        // Verify that the editor panel renders the collection editor
                        const editorContent = editorPanel.querySelector('merch-card-collection-editor');
                        expect(editorContent).to.exist;
                    });

                    it('displays version history button in toolbar', async () => {
                        await editorPanel.editFragment(fragmentStore);
                        await editorPanel.updateComplete;
                        await delay(100);

                        // Check that the version history button exists in the toolbar
                        const versionHistoryButton = editorPanel.querySelector('sp-action-button[value="version-history"]');
                        expect(versionHistoryButton).to.exist;
                        expect(versionHistoryButton.getAttribute('label')).to.equal('Version History');
                    });

                    it('has openVersionHistory method that navigates to version page', async () => {
                        await editorPanel.editFragment(fragmentStore);
                        await editorPanel.updateComplete;

                        // Verify openVersionHistory method exists and is callable
                        expect(editorPanel.openVersionHistory).to.be.a('function');
                        expect(editorPanel.fragment.id).to.equal('12345678-1234-1234-1234-123456789012');
                    });
                });

                describe('editor-panel collection author path and delete', () => {
                    let editorPanel;
                    let previousPage;
                    let previousFilters;

                    beforeEach(async () => {
                        previousPage = Store.page.get();
                        previousFilters = structuredClone(Store.filters.get());
                        Store.page.value = PAGE_NAMES.CONTENT;
                        editorPanel = await fixture(html`<editor-panel></editor-panel>`, { parentNode: spTheme });
                        editorPanel.repository.refreshFragment = async () => {};
                    });

                    afterEach(() => {
                        Store.page.value = previousPage;
                        Store.filters.set(previousFilters);
                        Store.fragments.inEdit.set(null);
                        sandbox.restore();
                    });

                    it('authorPath renders grouped variation subline from pznTags in the panel', async () => {
                        const grouped = new Fragment({
                            id: 'aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa',
                            path: '/content/dam/mas/sandbox/en_US/pac/pzn/grouped-tags',
                            title: 'Grouped tags',
                            model: { path: COLLECTION_MODEL_PATH, name: 'Collection' },
                            fields: [
                                { name: 'label', values: ['L'] },
                                { name: 'pznTags', values: ['mas:segment/locale-a', 'mas:segment/locale-b'] },
                            ],
                            tags: [],
                        });
                        const parent = new Fragment({
                            id: 'bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb',
                            title: 'Parent collection',
                            path: '/content/dam/mas/sandbox/en_US/pac/parent',
                            model: { path: COLLECTION_MODEL_PATH, name: 'Collection' },
                            fields: [{ name: 'label', values: ['P'] }],
                            tags: [],
                        });
                        editorPanel.localeDefaultFragment = parent;
                        editorPanel.inEdit.set(new FragmentStore(grouped));
                        await editorPanel.updateComplete;

                        expect(editorPanel.textContent).to.include('Grouped variation');
                        expect(editorPanel.textContent).to.include('locale-a, locale-b');
                    });

                    it('authorPath renders regional variation subline in the panel', async () => {
                        const regional = new Fragment({
                            id: 'abababab-abab-abab-abab-abababababab',
                            path: '/content/dam/mas/sandbox/en_BE/pac/regional-collection',
                            title: 'Regional collection',
                            model: { path: COLLECTION_MODEL_PATH, name: 'Collection' },
                            fields: [{ name: 'label', values: ['L'] }],
                            tags: [],
                        });
                        editorPanel.inEdit.set(new FragmentStore(regional));
                        sandbox.stub(editorPanel.editorContextStore, 'isVariation').returns(false);
                        editorPanel.requestUpdate();
                        await editorPanel.updateComplete;

                        expect(editorPanel.textContent).to.include('Regional variation');
                        expect(editorPanel.textContent).to.include('Belgium (EN)');
                    });

                    it('confirmDelete skips removeFromParentVariations when no parent resolves', async () => {
                        const grouped = new Fragment({
                            id: 'cccccccc-cccc-cccc-cccc-cccccccccccc',
                            path: '/content/dam/mas/sandbox/en_US/pac/pzn/orphan-del',
                            title: 'Var',
                            model: { path: COLLECTION_MODEL_PATH, name: 'Collection' },
                            fields: [{ name: 'label', values: ['L'] }],
                            tags: [],
                        });
                        editorPanel.inEdit.set(new FragmentStore(grouped));
                        editorPanel.localeDefaultFragment = null;
                        sandbox.stub(editorPanel.editorContextStore, 'isVariation').returns(true);
                        sandbox.stub(editorPanel.editorContextStore, 'getLocaleDefaultFragmentAsync').resolves(null);
                        const resetSpy = sandbox.stub(Store.editor, 'resetChanges');
                        const removeSpy = sandbox.stub(editorPanel.repository, 'removeFromParentVariations').resolves();
                        const deleteSpy = sandbox.stub(editorPanel.repository, 'deleteFragment').resolves(true);
                        sandbox.stub(Events.toast, 'emit');
                        sandbox.stub(editorPanel, 'unmaskOtherFragments');
                        sandbox.stub(editorPanel.reactiveController, 'updateStores');

                        await editorPanel.confirmDelete();

                        expect(removeSpy.called).to.be.false;
                        expect(
                            deleteSpy.calledOnceWith(grouped, {
                                force: true,
                                startToast: false,
                                endToast: false,
                            }),
                        ).to.be.true;
                        expect(resetSpy.callCount).to.equal(1);
                    });

                    it('confirmDelete calls deleteFragment with fragment only for non-variation', async () => {
                        const collection = new Fragment({
                            id: 'dddddddd-dddd-dddd-dddd-dddddddddddd',
                            path: '/content/dam/mas/sandbox/en_US/pac/root-collection',
                            title: 'Root coll',
                            model: { path: COLLECTION_MODEL_PATH, name: 'Collection' },
                            fields: [{ name: 'label', values: ['L'] }],
                            tags: [],
                        });
                        editorPanel.inEdit.set(new FragmentStore(collection));
                        sandbox.stub(editorPanel.editorContextStore, 'isVariation').returns(false);
                        const resetSpy = sandbox.stub(Store.editor, 'resetChanges');
                        const deleteSpy = sandbox.stub(editorPanel.repository, 'deleteFragment').resolves(true);
                        sandbox.stub(editorPanel, 'unmaskOtherFragments');
                        sandbox.stub(editorPanel.reactiveController, 'updateStores');

                        await editorPanel.confirmDelete();

                        expect(deleteSpy.calledOnceWith(collection)).to.be.true;
                        expect(resetSpy.callCount).to.equal(1);
                    });

                    it('does not update locale filter when opening a collection locale variation in side editor', async () => {
                        const regional = new Fragment({
                            id: 'eeeeeeee-eeee-eeee-eeee-eeeeeeeeeeee',
                            path: '/content/dam/mas/sandbox/en_IL/pac/regional-collection',
                            title: 'Regional coll',
                            model: { path: COLLECTION_MODEL_PATH, name: 'Collection' },
                            fields: [{ name: 'label', values: ['L'] }],
                            tags: [],
                        });
                        const store = new FragmentStore(regional);
                        editorPanel.inEdit.set(store);
                        Store.filters.set((prev) => ({ ...prev, locale: 'en_US' }));
                        sandbox.stub(editorPanel.editorContextStore, 'loadFragmentContext').resolves();
                        sandbox.stub(editorPanel.editorContextStore, 'isVariation').returns(true);
                        sandbox.stub(editorPanel, 'fetchLocaleDefaultFragment').resolves();
                        const loadPreviewSpy = sandbox.stub(editorPanel.repository, 'loadPreviewPlaceholders').resolves();

                        await editorPanel.loadLocaleDefaultFragmentContext(regional.id);

                        expect(Store.filters.get().locale).to.equal('en_US');
                        expect(loadPreviewSpy.called).to.be.false;
                    });
                });

                describe('grouped collection variation delete', () => {
                    let editorPanel;

                    beforeEach(async () => {
                        editorPanel = await fixture(html`<editor-panel></editor-panel>`, { parentNode: spTheme });
                        editorPanel.repository.refreshFragment = async () => {};
                    });

                    afterEach(() => {
                        sandbox.restore();
                    });

                    it('confirmDelete removes variation from parent, deletes with force, and clears editor', async () => {
                        const grouped = new Fragment({
                            id: '99999999-9999-9999-9999-999999999999',
                            path: '/content/dam/mas/sandbox/en_US/pac/pzn/to-delete',
                            title: 'Del',
                            model: { path: COLLECTION_MODEL_PATH, name: 'Collection' },
                            fields: [{ name: 'label', values: ['L'] }],
                            tags: [],
                        });
                        const store = new FragmentStore(grouped);
                        editorPanel.inEdit.set(store);
                        const parentFrag = new Fragment({
                            id: '88888888-8888-8888-8888-888888888888',
                            path: '/content/dam/mas/sandbox/en_US/pac/parent',
                            title: 'Parent',
                            model: { path: COLLECTION_MODEL_PATH, name: 'Collection' },
                            fields: [{ name: 'label', values: ['P'] }],
                            tags: [],
                        });
                        editorPanel.localeDefaultFragment = parentFrag;
                        sandbox.stub(editorPanel.editorContextStore, 'isVariation').returns(true);
                        const resetSpy = sandbox.stub(Store.editor, 'resetChanges');
                        const removeSpy = sandbox.stub(editorPanel.repository, 'removeFromParentVariations').resolves();
                        const deleteSpy = sandbox.stub(editorPanel.repository, 'deleteFragment').resolves(true);
                        const toastEmitSpy = sandbox.stub(Events.toast, 'emit');
                        const unmaskSpy = sandbox.stub(editorPanel, 'unmaskOtherFragments');
                        const updateStoresSpy = sandbox.stub(editorPanel.reactiveController, 'updateStores');

                        await editorPanel.confirmDelete();

                        expect(editorPanel.showDeleteDialog).to.be.false;
                        expect(resetSpy.callCount).to.equal(1);
                        expect(removeSpy.calledOnceWith(parentFrag, grouped.path)).to.be.true;
                        expect(
                            deleteSpy.calledOnceWith(grouped, {
                                force: true,
                                startToast: false,
                                endToast: false,
                            }),
                        ).to.be.true;
                        expect(
                            toastEmitSpy.calledWithMatch({
                                variant: 'positive',
                                content: 'Fragment successfully deleted.',
                            }),
                        ).to.be.true;
                        expect(unmaskSpy.calledOnce).to.be.true;
                        expect(editorPanel.inEdit.get()).to.be.null;
                        expect(updateStoresSpy.called).to.be.true;
                    });
                });
            });
        </script>
        <mas-repository base-url="http://localhost:2023/test/mocks"></mas-repository>
        <sp-theme system="spectrum-two" color="light" scale="medium"></sp-theme>
    </body>
</html>
